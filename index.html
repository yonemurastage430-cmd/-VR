<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portal de Consulta</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#eef2f7;
}

/* HEADER */

.header{
background:#0f172a;
color:white;
padding:18px;
text-align:center;
font-weight:600;
}

/* CONTAINER */

.container{
max-width:420px;
margin:40px auto;
padding:20px;
}

/* CARD */

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
text-align:center;
}

/* TITULO */

h1{
font-size:24px;
margin-bottom:10px;
}

/* TEXTO */

.desc{
font-size:14px;
color:#555;
margin-bottom:20px;
}

/* INPUT */

.input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:8px;
margin-bottom:15px;
}

/* BOTÃO */

.btn{
width:100%;
background:#2563eb;
color:white;
border:none;
padding:15px;
border-radius:8px;
font-weight:600;
font-size:16px;
cursor:pointer;
}

.btn:hover{
background:#1d4ed8;
}

/* INFO */

.info{
margin-top:15px;
font-size:12px;
color:#777;
}

/* SEGURANÇA */

.security{
margin-top:20px;
font-size:13px;
color:#444;
background:#f1f5ff;
padding:12px;
border-radius:8px;
}

/* FOOTER */

.footer{
margin-top:25px;
text-align:center;
font-size:12px;
color:#777;
}

.footer a{
color:#2563eb;
margin:0 6px;
text-decoration:none;
}

</style>
</head>

<body>

<div class="header">
Central de Consulta
</div>

<div class="container">

<div class="card">

<h1>Consultar Informações</h1>

<div class="desc">
Informe seus dados para acessar informações disponíveis online.
</div>

<input class="input" type="text" placeholder="Digite seu CPF">

<button class="btn" onclick="goLink()">
Continuar consulta
</button>

<div class="security">
🔒 Ambiente seguro • Seus dados não são armazenados nesta página
</div>

<div class="info">
Você será direcionado para uma página externa com mais informações.
</div>

</div>

<div class="footer">
<a href="#">Política</a> |
<a href="#">Termos</a> |
<a href="#">Contato</a>
</div>

</div>

<script>

function goLink(){
window.location.href="https://prismatic-crostata-496139.netlify.app/";
}

</script>

</body>
</html>
